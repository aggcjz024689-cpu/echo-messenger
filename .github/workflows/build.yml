name: Build EchoMessenger EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Download WebView2Loader.dll
      run: |
        curl -L -o webview2.zip https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/1.0.2903.40
        powershell -command "Expand-Archive -Force webview2.zip webview2"
        copy webview2\build\native\x64\WebView2Loader.dll .
    
    - name: Compile resource file
      run: |
        rc icon.rc
    
    - name: Compile EXE
      run: |
        cl /EHsc /std:c++17 main.cpp icon.res /link user32.lib ole32.lib shell32.lib gdi32.lib
    
    - name: Upload EXE and DLL
      uses: actions/upload-artifact@v4
      with:
        name: EchoMessenger
        path: |
          main.exe
          WebView2Loader.dll
