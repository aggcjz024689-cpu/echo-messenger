name: Build EchoMessenger EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: List files
      run: dir
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Compile resource file
      run: |
        rc icon.rc
    
    - name: Compile EXE
      run: |
        cl /EHsc /std:c++17 main.cpp icon.res /link user32.lib ole32.lib shell32.lib gdi32.lib
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: EchoMessenger
        path: |
          main.exe
