<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ЭХО — мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0e0e10; color: white; height: 100vh; display: flex; flex-direction: column; }
        
        .auth-screen { padding: 20px; display: flex; flex-direction: column; justify-content: center; height: 100%; max-width: 400px; margin: 0 auto; }
        .auth-screen input, .auth-screen button { padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 16px; }
        .auth-screen input { background: #2a2a2e; color: white; }
        .auth-screen button { background: #9147ff; color: white; font-weight: bold; cursor: pointer; }
        .auth-screen hr { margin: 15px 0; border-color: #2a2a2e; }
        
        .chat-screen { display: flex; flex-direction: column; height: 100%; }
        .top-bar { display: flex; align-items: center; gap: 12px; padding: 12px; background: #18181b; border-bottom: 1px solid #2a2a2e; }
        .menu-btn { background: #9147ff; border: none; color: white; font-size: 24px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
        .chat-title { flex: 1; font-weight: bold; font-size: 18px; }
        
        .users-panel { position: fixed; left: 0; top: 0; width: 280px; height: 100%; background: #1f1f23; transform: translateX(-100%); transition: transform 0.3s; z-index: 1000; overflow-y: auto; }
        .users-panel.open { transform: translateX(0); }
        .users-header { padding: 20px; background: #18181b; border-bottom: 1px solid #2a2a2e; }
        .user-item { padding: 15px; border-bottom: 1px solid #2a2a2e; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .user-item:active { background: #3a3a3e; }
        .user-name { font-weight: bold; font-size: 16px; }
        .user-online { font-size: 12px; color: #4ade80; margin-top: 4px; }
        .user-offline { font-size: 12px; color: #888; margin-top: 4px; }
        .admin-badge { background: #ff4444; border-radius: 8px; padding: 2px 6px; font-size: 10px; }
        .banned-badge { background: #555; border-radius: 8px; padding: 2px 6px; font-size: 10px; }
        
        .messages-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 18px; margin: 4px 0; }
        .message-mine { background: #9147ff; align-self: flex-end; }
        .message-other { background: #2a2a2e; align-self: flex-start; }
        .message-username { font-size: 11px; color: #aaa; margin-bottom: 4px; }
        .message-text { font-size: 15px; word-wrap: break-word; }
        .message-time { font-size: 10px; color: #aaa; text-align: right; margin-top: 4px; }
        
        .input-panel { display: flex; padding: 12px; background: #18181b; border-top: 1px solid #2a2a2e; gap: 10px; }
        .input-panel input { flex: 1; padding: 12px; border-radius: 24px; border: none; background: #2a2a2e; color: white; font-size: 16px; }
        .input-panel button { padding: 12px 20px; border-radius: 24px; border: none; background: #9147ff; color: white; font-weight: bold; cursor: pointer; }
        .file-btn { background: #3a3a3e; }
        
        .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; }
        .modal.active { display: flex; }
        .modal-content { background: #1f1f23; border-radius: 20px; padding: 20px; width: 90%; max-width: 350px; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: none; background: #2a2a2e; color: white; }
        .modal-content button { padding: 10px; margin-top: 10px; border-radius: 8px; border: none; background: #9147ff; color: white; cursor: pointer; width: 100%; }
        
        .call-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 3000; align-items: center; justify-content: center; flex-direction: column; }
        .call-modal.active { display: flex; }
        .remote-video { width: 100%; height: 100%; object-fit: cover; }
        .local-video { position: absolute; bottom: 20px; right: 20px; width: 120px; height: 160px; border-radius: 12px; border: 2px solid white; object-fit: cover; }
        
        @media (max-width: 768px) {
            .chat-title { font-size: 16px; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>

<div id="callModal" class="call-modal">
    <video id="remoteVideo" class="remote-video" autoplay playsinline></video>
    <video id="localVideo" class="local-video" autoplay playsinline muted></video>
    <div class="call-controls" style="position:absolute; bottom:30px; display:flex; gap:20px;">
        <button onclick="toggleMute()" style="padding:12px 24px; border-radius:40px; background:#2a2a2e; color:white; border:none;">🎤 Выкл</button>
        <button onclick="endCall()" style="padding:12px 24px; border-radius:40px; background:#ff4444; color:white; border:none;">📞 Завершить</button>
    </div>
</div>

<div id="authScreen" class="auth-screen">
    <h2>💬 ЭХО</h2>
    <h3>🔐 Регистрация</h3>
    <input type="text" id="regUsername" placeholder="@username">
    <input type="text" id="regDisplayName" placeholder="Отображаемое имя">
    <input type="tel" id="regPhone" placeholder="Номер телефона (+7XXXXXXXXXX)">
    <input type="password" id="regPass" placeholder="Пароль">
    <button onclick="doRegister()">Создать аккаунт</button>
    <hr>
    <h3>🔐 Вход</h3>
    <input type="text" id="loginUsername" placeholder="@username">
    <input type="password" id="loginPass" placeholder="Пароль">
    <button onclick="doLogin()">Войти</button>
</div>

<div id="chatScreen" style="display: none;" class="chat-screen">
    <div class="top-bar">
        <button class="menu-btn" onclick="toggleUsers()">☰</button>
        <div class="chat-title" id="chatTitle">ЭХО</div>
        <div class="call-buttons" id="callButtons" style="display: none;">
            <button class="call-btn" onclick="startCall(false)">📞</button>
            <button class="call-btn video" onclick="startCall(true)">📹</button>
        </div>
    </div>
    <div class="messages-area" id="messagesArea">
        <div style="text-align:center; color:#888; padding:20px;">Нажмите ☰ и выберите собеседника</div>
    </div>
    <div class="input-panel">
        <button class="file-btn" onclick="selectFile()">📎</button>
        <input type="text" id="messageInput" placeholder="Сообщение..." disabled>
        <button onclick="sendMsg()" id="sendBtn" disabled>➤</button>
    </div>
</div>

<div id="usersPanel" class="users-panel">
    <div class="users-header">
        <strong>💬 Диалоги</strong>
        <div style="margin-top: 10px;" id="myInfo"></div>
    </div>
    <div id="usersList"></div>
</div>
<div id="overlay" class="overlay" onclick="closeUsers()"></div>

<script>
    let ws = null;
    let myId = null;
    let myDisplayName = null;
    let myIsAdmin = false;
    let selectedUserId = null;
    let users = {};
    
    let peerConnection = null;
    let localStream = null;
    let isInCall = false;
    
    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ]
    };

    async function doRegister() {
        let username = document.getElementById('regUsername').value.trim();
        let displayName = document.getElementById('regDisplayName').value.trim();
        let phone = document.getElementById('regPhone').value.trim();
        let password = document.getElementById('regPass').value.trim();
        if (!username || !displayName || !phone || !password) { alert('Заполните все поля'); return; }
        if (!username.startsWith('@')) username = '@' + username;
        
        let res = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, display_name: displayName, phone, password })
        });
        let data = await res.json();
        if (data.user_id) alert('✅ Регистрация успешна! Теперь войдите.');
        else alert('❌ Ошибка: ' + data.detail);
    }

    async function doLogin() {
        let username = document.getElementById('loginUsername').value.trim();
        let password = document.getElementById('loginPass').value.trim();
        if (!username || !password) { alert('Заполните все поля'); return; }
        if (!username.startsWith('@')) username = '@' + username;
        
        let res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        let data = await res.json();
        if (data.user_id) {
            myId = data.user_id;
            myDisplayName = data.display_name;
            myIsAdmin = data.is_admin;
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';
            document.getElementById('myInfo').innerHTML = `<strong>${myDisplayName}</strong> 🟢 ${myIsAdmin ? '👑 Админ' : ''}`;
            connectWebSocket();
            loadUsers();
        } else alert('❌ Ошибка входа: ' + data.detail);
    }

    function connectWebSocket() {
        let host = window.location.hostname;
        let wsUrl = `wss://${host}/ws`;
        if (host === 'localhost') wsUrl = `ws://${host}:8000/ws`;
        
        ws = new WebSocket(wsUrl);
        ws.onopen = () => { ws.send(myId); };
        ws.onmessage = (event) => {
            let data = JSON.parse(event.data);
            if (data.type === 'message') {
                addMessage(data.from_username, data.content, data.from === myId);
            } else if (data.type === 'users_list') {
                users = {};
                data.users.forEach(u => { users[u.id] = u; });
                renderUsers();
            } else if (data.type === 'typing') {
                if (selectedUserId === data.from) {
                    document.getElementById('chatTitle').innerHTML += ' ✏️';
                    setTimeout(() => loadChatTitle(), 1500);
                }
            }
        };
        ws.onclose = () => setTimeout(() => connectWebSocket(), 3000);
    }

    async function loadUsers() {
        let res = await fetch('/api/users');
        let list = await res.json();
        users = {};
        list.forEach(u => { users[u.id] = u; });
        renderUsers();
    }

    function renderUsers() {
        let container = document.getElementById('usersList');
        let html = '';
        for (let id in users) {
            if (id !== myId) {
                let u = users[id];
                let badges = '';
                if (u.is_admin) badges += '<span class="admin-badge">👑 Админ</span> ';
                if (u.is_banned) badges += '<span class="banned-badge">🚫 Бан</span> ';
                html += `<div class="user-item" onclick="selectUser('${id}', '${u.display_name}')">
                    <div>
                        <div class="user-name">${escapeHtml(u.display_name)}</div>
                        <div class="${u.is_online ? 'user-online' : 'user-offline'}">${u.is_online ? '🟢 онлайн' : '⚫ офлайн'}</div>
                    </div>
                    <div>${badges}</div>
                </div>`;
            }
        }
        if (!html) html = '<div style="padding:15px; text-align:center;">🤷 Нет других пользователей</div>';
        container.innerHTML = html;
    }

    function selectUser(id, name) {
        selectedUserId = id;
        loadChatTitle();
        document.getElementById('callButtons').style.display = 'flex';
        document.getElementById('messageInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('messagesArea').innerHTML = '';
        closeUsers();
        loadMessages();
        if (window.innerWidth <= 768) closeUsers();
    }
    
    function loadChatTitle() {
        let user = users[selectedUserId];
        let title = user ? user.display_name : 'Чат';
        document.getElementById('chatTitle').innerHTML = escapeHtml(title);
    }

    async function loadMessages() {
        if (!selectedUserId) return;
        let res = await fetch(`/api/messages/${selectedUserId}?user_id=${myId}`);
        let msgs = await res.json();
        let container = document.getElementById('messagesArea');
        container.innerHTML = '';
        if (Array.isArray(msgs)) {
            msgs.forEach(m => {
                let isMine = m.from_user_id === myId;
                let senderName = isMine ? myDisplayName : (users[m.from_user_id]?.display_name || 'Пользователь');
                addMessage(senderName, m.content, isMine);
            });
        }
    }

    function addMessage(username, content, isMine) {
        let container = document.getElementById('messagesArea');
        let div = document.createElement('div');
        div.className = `message ${isMine ? 'message-mine' : 'message-other'}`;
        let time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        div.innerHTML = `
            ${!isMine ? `<div class="message-username">${escapeHtml(username)}</div>` : ''}
            <div class="message-text">${escapeHtml(content)}</div>
            <div class="message-time">${time}</div>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function sendMsg() {
        let input = document.getElementById('messageInput');
        let text = input.value.trim();
        if (!text || !selectedUserId) return;
        ws.send(JSON.stringify({ to_user_id: selectedUserId, content: text, type: 'text' }));
        addMessage(myDisplayName, text, true);
        
        // Отправляем статус печатает
        ws.send(JSON.stringify({ to_user_id: selectedUserId, type: 'typing' }));
        
        input.value = '';
    }

    function selectFile() {
        let input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*,video/*';
        input.onchange = (e) => {
            let file = e.target.files[0];
            if (!file) return;
            let reader = new FileReader();
            reader.onload = (ev) => {
                let msgType = file.type.startsWith('image/') ? 'image' : 'video';
                ws.send(JSON.stringify({ to_user_id: selectedUserId, content: ev.target.result, type: msgType }));
                addMessage(myDisplayName, '📎 Файл', true);
            };
            reader.readAsDataURL(file);
        };
        input.click();
    }

    function sendTyping() {
        if (ws && selectedUserId) {
            ws.send(JSON.stringify({ to_user_id: selectedUserId, type: 'typing' }));
        }
    }
    
    document.getElementById('messageInput').addEventListener('input', () => {
        sendTyping();
    });

    // Звонки (заглушка)
    async function startCall(isVideo) { alert('Звонки работают через WebRTC. Требуется HTTPS.'); }
    function toggleMute() { }
    function endCall() { }
    function toggleUsers() {
        let panel = document.getElementById('usersPanel');
        let overlay = document.getElementById('overlay');
        panel.classList.toggle('open');
        overlay.style.display = panel.classList.contains('open') ? 'block' : 'none';
    }
    function closeUsers() {
        document.getElementById('usersPanel').classList.remove('open');
        document.getElementById('overlay').style.display = 'none';
    }
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m]);
    }
    
    document.addEventListener('keypress', (e) => {
        if (e.target.id === 'messageInput' && e.key === 'Enter') sendMsg();
    });
</script>
</body>
</html>
