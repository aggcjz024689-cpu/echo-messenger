<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ЭХО — мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0e0e10; color: white; height: 100vh; display: flex; flex-direction: column; }
        
        .auth-screen { padding: 20px; display: flex; flex-direction: column; justify-content: center; height: 100%; max-width: 400px; margin: 0 auto; }
        .auth-screen input, .auth-screen button { padding: 12px; margin: 8px 0; border-radius: 8px; border: none; }
        .auth-screen input { background: #2a2a2e; color: white; font-size: 16px; }
        .auth-screen button { background: #9147ff; color: white; font-weight: bold; cursor: pointer; }
        .auth-screen hr { margin: 15px 0; border-color: #2a2a2e; }
        
        .chat-screen { display: flex; flex-direction: column; height: 100%; }
        .top-bar { display: flex; align-items: center; gap: 12px; padding: 12px; background: #18181b; border-bottom: 1px solid #2a2a2e; }
        .menu-btn { background: #9147ff; border: none; color: white; font-size: 24px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
        .chat-title { flex: 1; font-weight: bold; font-size: 18px; }
        .call-buttons { display: flex; gap: 8px; }
        .call-btn { background: #2a2a2e; border: none; color: white; font-size: 20px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
        .call-btn.video { background: #4ade80; }
        
        .users-panel { position: fixed; left: 0; top: 0; width: 280px; height: 100%; background: #1f1f23; transform: translateX(-100%); transition: transform 0.3s; z-index: 1000; overflow-y: auto; }
        .users-panel.open { transform: translateX(0); }
        .users-header { padding: 20px; background: #18181b; border-bottom: 1px solid #2a2a2e; }
        .user-item { padding: 15px; border-bottom: 1px solid #2a2a2e; cursor: pointer; }
        .user-item:active { background: #3a3a3e; }
        .user-name { font-weight: bold; font-size: 16px; }
        .user-online { font-size: 12px; color: #4ade80; margin-top: 4px; }
        .user-offline { font-size: 12px; color: #888; margin-top: 4px; }
        
        .messages-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 18px; margin: 4px 0; }
        .message-mine { background: #9147ff; align-self: flex-end; }
        .message-other { background: #2a2a2e; align-self: flex-start; }
        .message-username { font-size: 11px; color: #aaa; margin-bottom: 4px; }
        .message-text { font-size: 15px; word-wrap: break-word; }
        .message-img { max-width: 200px; max-height: 200px; border-radius: 12px; cursor: pointer; margin-top: 5px; }
        .message-time { font-size: 10px; color: #aaa; text-align: right; margin-top: 4px; }
        
        .input-panel { display: flex; padding: 12px; background: #18181b; border-top: 1px solid #2a2a2e; gap: 10px; }
        .input-panel input { flex: 1; padding: 12px; border-radius: 24px; border: none; background: #2a2a2e; color: white; font-size: 16px; }
        .input-panel button { padding: 12px 20px; border-radius: 24px; border: none; background: #9147ff; color: white; font-weight: bold; cursor: pointer; }
        .file-btn { background: #3a3a3e; }
        
        .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
        
        .call-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; flex-direction: column; }
        .call-modal.active { display: flex; }
        .remote-video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        .local-video { position: absolute; bottom: 20px; right: 20px; width: 120px; height: 160px; border-radius: 12px; border: 2px solid white; object-fit: cover; }
        .call-controls { position: absolute; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; gap: 20px; }
        .call-controls button { padding: 15px 30px; border-radius: 50px; border: none; font-size: 18px; cursor: pointer; }
        .end-call-btn { background: #ff4444; color: white; }
        .mute-btn { background: #2a2a2e; color: white; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; }
        .modal.active { display: flex; }
        .modal img { max-width: 90%; max-height: 80%; border-radius: 8px; }
        .modal-close { position: absolute; top: 20px; right: 30px; font-size: 40px; color: white; cursor: pointer; background: none; border: none; }
        .modal-download { position: absolute; bottom: 30px; background: #9147ff; color: white; padding: 12px 24px; border-radius: 30px; border: none; font-size: 16px; cursor: pointer; }
        
        @media (max-width: 768px) {
            .chat-title { font-size: 16px; }
            .message { max-width: 90%; }
            .message-img { max-width: 150px; }
            .local-video { width: 80px; height: 120px; }
        }
    </style>
</head>
<body>

<div id="imageModal" class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <img id="modalImage" src="">
    <button class="modal-download" onclick="downloadCurrentImage()">📥 Скачать</button>
</div>

<div id="callModal" class="call-modal">
    <video id="remoteVideo" class="remote-video" autoplay playsinline></video>
    <video id="localVideo" class="local-video" autoplay playsinline muted></video>
    <div class="call-controls">
        <button class="mute-btn" onclick="toggleMute()">🎤 Выкл</button>
        <button class="end-call-btn" onclick="hangUp()">📞 Завершить</button>
    </div>
</div>

<div id="authScreen" class="auth-screen">
    <h2>💬 ЭХО</h2>
    <h3>🔐 Вход</h3>
    <input type="text" id="loginName" placeholder="Имя">
    <input type="password" id="loginPass" placeholder="Пароль">
    <button onclick="doLogin()">Войти</button>
    <hr>
    <h3>📝 Регистрация</h3>
    <input type="text" id="regName" placeholder="Имя">
    <input type="password" id="regPass" placeholder="Пароль">
    <button onclick="doRegister()">Создать аккаунт</button>
</div>

<div id="chatScreen" style="display: none;" class="chat-screen">
    <div class="top-bar">
        <button class="menu-btn" onclick="toggleUsers()">☰</button>
        <div class="chat-title" id="chatTitle">ЭХО</div>
        <div class="call-buttons" id="callButtons" style="display: none;">
            <button class="call-btn" onclick="startCall(false)">📞</button>
            <button class="call-btn video" onclick="startCall(true)">📹</button>
        </div>
    </div>
    <div class="messages-area" id="messagesArea">
        <div style="text-align:center; color:#888; padding:20px;">Нажмите ☰ и выберите собеседника</div>
    </div>
    <div class="input-panel">
        <button class="file-btn" onclick="selectFile()">📎</button>
        <input type="text" id="messageInput" placeholder="Сообщение..." disabled>
        <button onclick="sendMsg()" id="sendBtn" disabled>➤</button>
    </div>
</div>

<div id="usersPanel" class="users-panel">
    <div class="users-header">
        <strong>💬 Диалоги</strong>
        <div style="margin-top: 10px;" id="myInfo"></div>
    </div>
    <div id="usersList"></div>
</div>
<div id="overlay" class="overlay" onclick="closeUsers()"></div>

<script>
    let ws = null;
    let myId = null;
    let myName = null;
    let selectedUserId = null;
    let users = {};
    let currentImageUrl = null;
    
    let peerConnection = null;
    let localStream = null;
    let isInCall = false;
    let isVideoCall = false;
    
    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ]
    };

    function openModal(imgUrl) {
        currentImageUrl = imgUrl;
        document.getElementById('modalImage').src = imgUrl;
        document.getElementById('imageModal').classList.add('active');
    }
    function closeModal() {
        document.getElementById('imageModal').classList.remove('active');
        currentImageUrl = null;
    }
    function downloadCurrentImage() {
        if (currentImageUrl) {
            let a = document.createElement('a');
            a.href = currentImageUrl;
            a.download = 'echo_image.jpg';
            a.click();
        }
    }

    async function doRegister() {
        let username = document.getElementById('regName').value.trim();
        let password = document.getElementById('regPass').value.trim();
        if (!username || !password) { alert('Заполните все поля'); return; }
        let res = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        let data = await res.json();
        if (data.user_id) alert('Регистрация успешна! Теперь войдите.');
        else alert('Ошибка: ' + JSON.stringify(data));
    }

    async function doLogin() {
        let username = document.getElementById('loginName').value.trim();
        let password = document.getElementById('loginPass').value.trim();
        if (!username || !password) { alert('Заполните все поля'); return; }
        let res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        let data = await res.json();
        if (data.user_id) {
            myId = data.user_id;
            myName = data.username;
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';
            document.getElementById('myInfo').innerHTML = `<strong>${myName}</strong> 🟢 Онлайн`;
            connectWebSocket();
            loadUsers();
        } else alert('Ошибка входа: ' + JSON.stringify(data));
    }

    function connectWebSocket() {
        let host = window.location.hostname;
        let wsUrl = `ws://${host}:8000/ws`;
        ws = new WebSocket(wsUrl);
        ws.onopen = () => { ws.send(myId); };
        ws.onmessage = (event) => {
            let data = JSON.parse(event.data);
            if (data.type === 'message') {
                addMessage(data.from_username, data.content, data.type2 || 'text', data.from === myId);
            } else if (data.type === 'users_list') {
                users = {};
                data.users.forEach(u => { users[u.id] = u; });
                renderUsers();
            } else if (data.type === 'call_offer') {
                handleCallOffer(data.from, data.from_username, data.offer);
            } else if (data.type === 'call_answer') {
                handleCallAnswer(data.answer);
            } else if (data.type === 'ice_candidate') {
                handleIceCandidate(data.candidate);
            } else if (data.type === 'call_end') {
                endCall();
            } else if (data.type === 'call_reject') {
                alert('Звонок отклонён');
                endCall();
            }
        };
        ws.onclose = () => setTimeout(() => connectWebSocket(), 3000);
    }

    async function loadUsers() {
        let res = await fetch('/api/users');
        let list = await res.json();
        users = {};
        list.forEach(u => { users[u.id] = u; });
        renderUsers();
    }

    function renderUsers() {
        let container = document.getElementById('usersList');
        let html = '';
        for (let id in users) {
            if (id !== myId) {
                let u = users[id];
                html += `<div class="user-item" onclick="selectUser('${id}', '${u.username}')">
                    <div class="user-name">${escapeHtml(u.username)}</div>
                    <div class="${u.is_online ? 'user-online' : 'user-offline'}">${u.is_online ? '🟢 онлайн' : '⚫ офлайн'}</div>
                </div>`;
            }
        }
        if (!html) html = '<div style="padding:15px; text-align:center;">Нет других пользователей</div>';
        container.innerHTML = html;
    }

    function selectUser(id, name) {
        selectedUserId = id;
        document.getElementById('chatTitle').innerHTML = `${escapeHtml(name)}`;
        document.getElementById('callButtons').style.display = 'flex';
        document.getElementById('messageInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('messagesArea').innerHTML = '';
        closeUsers();
        loadMessages();
        if (window.innerWidth <= 768) closeUsers();
    }

    async function loadMessages() {
        if (!selectedUserId) return;
        let res = await fetch(`/api/messages/${selectedUserId}?user_id=${myId}`);
        let msgs = await res.json();
        let container = document.getElementById('messagesArea');
        container.innerHTML = '';
        if (Array.isArray(msgs)) {
            msgs.forEach(m => {
                addMessage(m.from_username, m.content, m.type || 'text', m.from_user_id === myId);
            });
        }
    }

    function addMessage(username, content, type, isMine) {
        let container = document.getElementById('messagesArea');
        let div = document.createElement('div');
        div.className = `message ${isMine ? 'message-mine' : 'message-other'}`;
        let time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        let body = '';
        if (type === 'image') {
            body = `<img src="${content}" class="message-img" onclick="openModal('${content}')">`;
        } else if (type === 'video') {
            body = `<video src="${content}" controls class="message-img"></video>`;
        } else {
            body = `<div class="message-text">${escapeHtml(content)}</div>`;
        }
        div.innerHTML = `${!isMine ? `<div class="message-username">${escapeHtml(username)}</div>` : ''}${body}<div class="message-time">${time}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function sendMsg() {
        let input = document.getElementById('messageInput');
        let text = input.value.trim();
        if (!text || !selectedUserId) return;
        ws.send(JSON.stringify({ to_user_id: selectedUserId, content: text, type: 'text' }));
        addMessage(myName, text, 'text', true);
        input.value = '';
    }

    function selectFile() {
        let input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*,video/*';
        input.onchange = (e) => {
            let file = e.target.files[0];
            if (!file) return;
            let reader = new FileReader();
            reader.onload = (ev) => {
                let msgType = file.type.startsWith('image/') ? 'image' : 'video';
                ws.send(JSON.stringify({ to_user_id: selectedUserId, content: ev.target.result, type: msgType }));
                addMessage(myName, ev.target.result, msgType, true);
            };
            reader.readAsDataURL(file);
        };
        input.click();
    }

    // ========== ЗВОНКИ (с проверкой поддержки) ==========
    async function startCall(isVideo) {
        if (!selectedUserId) { alert('Выберите собеседника'); return; }
        
        // Проверка поддержки WebRTC
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert('❌ Ваш браузер не поддерживает аудио/видео звонки.\n\nИспользуйте:\n- Google Chrome\n- Microsoft Edge\n- Firefox\n- Яндекс.Браузер');
            return;
        }
        
        const constraints = { audio: true, video: isVideo };
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia(constraints);
        } catch (err) {
            console.error(err);
            if (err.name === 'NotFoundError' || err.name === 'NotReadableError') {
                if (isVideo) {
                    alert('⚠️ Камера не найдена. Пробую только голосовой звонок...');
                    try {
                        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                        isVideo = false;
                        isVideoCall = false;
                    } catch (err2) {
                        alert('❌ Нет доступа к микрофону! Проверьте разрешения.');
                        return;
                    }
                } else {
                    alert('❌ Микрофон не найден или недоступен');
                    return;
                }
            } else if (err.name === 'NotAllowedError') {
                alert('❌ Вы не разрешили доступ. Нажмите на замок в адресной строке и разрешите микрофон.');
                return;
            } else {
                alert('❌ Ошибка: ' + err.message);
                return;
            }
        }
        
        isVideoCall = isVideo;
        document.getElementById('localVideo').srcObject = localStream;
        document.getElementById('localVideo').style.display = isVideo ? 'block' : 'none';
        
        createPeerConnection();
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        ws.send(JSON.stringify({ type: 'call_offer', to_user_id: selectedUserId, offer: peerConnection.localDescription }));
        document.getElementById('callModal').classList.add('active');
        isInCall = true;
    }

    async function handleCallOffer(fromUserId, fromUsername, offer) {
        if (isInCall) {
            ws.send(JSON.stringify({ type: 'call_reject', to_user_id: fromUserId }));
            return;
        }
        
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert('❌ Ваш браузер не поддерживает звонки');
            ws.send(JSON.stringify({ type: 'call_reject', to_user_id: fromUserId }));
            return;
        }
        
        const accept = confirm(`${fromUsername} звонит вам. Принять звонок?`);
        if (!accept) {
            ws.send(JSON.stringify({ type: 'call_reject', to_user_id: fromUserId }));
            return;
        }
        
        selectedUserId = fromUserId;
        document.getElementById('chatTitle').innerHTML = `${escapeHtml(fromUsername)}`;
        document.getElementById('callButtons').style.display = 'flex';
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
        } catch (err) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            } catch (err2) {
                alert('❌ Не удалось получить доступ к микрофону');
                return;
            }
        }
        
        const hasVideo = localStream.getVideoTracks().length > 0;
        isVideoCall = hasVideo;
        document.getElementById('localVideo').srcObject = localStream;
        document.getElementById('localVideo').style.display = hasVideo ? 'block' : 'none';
        
        createPeerConnection();
        await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        ws.send(JSON.stringify({ type: 'call_answer', to_user_id: fromUserId, answer: peerConnection.localDescription }));
        document.getElementById('callModal').classList.add('active');
        isInCall = true;
    }

    function handleCallAnswer(answer) {
        if (peerConnection && peerConnection.signalingState === 'have-local-offer') {
            peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
        }
    }

    function handleIceCandidate(candidate) {
        if (peerConnection) {
            peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
        }
    }

    function createPeerConnection() {
        peerConnection = new RTCPeerConnection(configuration);
        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                ws.send(JSON.stringify({ type: 'ice_candidate', to_user_id: selectedUserId, candidate: event.candidate }));
            }
        };
        peerConnection.ontrack = (event) => {
            document.getElementById('remoteVideo').srcObject = event.streams[0];
        };
        if (localStream) {
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        }
    }

    function toggleMute() {
        if (localStream) {
            const audioTrack = localStream.getAudioTracks()[0];
            if (audioTrack) {
                audioTrack.enabled = !audioTrack.enabled;
                const muteBtn = document.querySelector('.mute-btn');
                if (muteBtn) muteBtn.textContent = audioTrack.enabled ? '🎤 Выкл' : '🎤 Вкл';
            }
        }
    }

    function endCall() {
        if (peerConnection) { peerConnection.close(); peerConnection = null; }
        if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
        document.getElementById('callModal').classList.remove('active');
        document.getElementById('remoteVideo').srcObject = null;
        document.getElementById('localVideo').srcObject = null;
        isInCall = false;
        if (selectedUserId) {
            ws.send(JSON.stringify({ type: 'call_end', to_user_id: selectedUserId }));
        }
    }

    function hangUp() { endCall(); }

    function toggleUsers() {
        let panel = document.getElementById('usersPanel');
        let overlay = document.getElementById('overlay');
        panel.classList.toggle('open');
        overlay.style.display = panel.classList.contains('open') ? 'block' : 'none';
    }
    
    function closeUsers() {
        document.getElementById('usersPanel').classList.remove('open');
        document.getElementById('overlay').style.display = 'none';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
    document.addEventListener('keypress', (e) => { if (e.target.id === 'messageInput' && e.key === 'Enter') sendMsg(); });
    document.addEventListener('click', (e) => {
        let panel = document.getElementById('usersPanel');
        let toggle = document.querySelector('.menu-btn');
        if (window.innerWidth <= 768 && panel.classList.contains('open')) {
            if (!panel.contains(e.target) && !toggle.contains(e.target)) closeUsers();
        }
    });
</script>
</body>
</html>
